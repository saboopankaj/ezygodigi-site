    <script>
        const canvas = document.getElementById('bannerCanvas');
        const ctx = canvas.getContext('2d');
        let bgImage = null;
        let currentTemplate = 'minimal';
        let textAlignment = 'left';
        let bgImageOpacity = 40;
        let gradientOverlayOpacity = 85;

        const templates = {
            minimal: { color1: '#667eea', color2: '#764ba2' },
            professional: { color1: '#0077b5', color2: '#00a0dc' },
            dark: { color1: '#2c3e50', color2: '#34495e' },
            warm: { color1: '#f093fb', color2: '#f5576c' },
            tech: { color1: '#4facfe', color2: '#00f2fe' },
            nature: { color1: '#56ab2f', color2: '#a8e063' }
        };

        function selectTemplate(template, element) {
            currentTemplate = template;
            document.querySelectorAll('.template-card').forEach(card => {
                card.classList.remove('selected');
            });
            if (element) {
                element.classList.add('selected');
            }

            const colors = templates[template];
            document.getElementById('color1').value = colors.color1;
            document.getElementById('color2').value = colors.color2;
            drawBanner();
        }

        function setAlignment(align, element) {
            textAlignment = align;
            document.querySelectorAll('.align-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (element) {
                element.classList.add('active');
            }
            drawBanner();
        }

        function setColor1(color) {
            document.getElementById('color1').value = color;
            drawBanner();
        }

        function setColor2(color) {
            document.getElementById('color2').value = color;
            drawBanner();
        }

        document.getElementById('mainText').addEventListener('input', drawBanner);
        document.getElementById('subText').addEventListener('input', drawBanner);
        document.getElementById('additionalText').addEventListener('input', drawBanner);
        document.getElementById('color1').addEventListener('input', drawBanner);
        document.getElementById('color2').addEventListener('input', drawBanner);
        document.getElementById('textColor').addEventListener('input', drawBanner);
        document.getElementById('fontFamily').addEventListener('change', drawBanner);

        document.getElementById('bgImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('imagePreview').textContent = `✓ ${file.name}`;
                document.getElementById('opacityControl').style.display = 'block';
                document.getElementById('gradientOpacityControl').style.display = 'block';
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        bgImage = img;
                        drawBanner();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Background image opacity control
        document.getElementById('bgOpacity').addEventListener('input', function(e) {
            bgImageOpacity = parseInt(e.target.value);
            document.getElementById('bgOpacityValue').textContent = bgImageOpacity + '%';
            drawBanner();
        });

        // Gradient overlay opacity control
        document.getElementById('gradientOpacity').addEventListener('input', function(e) {
            gradientOverlayOpacity = parseInt(e.target.value);
            document.getElementById('gradientOpacityValue').textContent = gradientOverlayOpacity + '%';
            drawBanner();
        });

        function getTextX(textWidth) {
            if (textAlignment === 'center') {
                return canvas.width / 2;
            } else if (textAlignment === 'right') {
                return canvas.width - 80;
            }
            return 80; // left
        }

        function drawBanner() {
            const mainText = document.getElementById('mainText').value || 'Your Name';
            const subText = document.getElementById('subText').value || 'Your Title';
            const additionalText = document.getElementById('additionalText').value;
            const color1 = document.getElementById('color1').value;
            const color2 = document.getElementById('color2').value;
            const textColor = document.getElementById('textColor').value;
            const fontFamily = document.getElementById('fontFamily').value;

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background image if exists
            if (bgImage) {
                ctx.globalAlpha = bgImageOpacity / 100;
                const scale = Math.max(canvas.width / bgImage.width, canvas.height / bgImage.height);
                const x = (canvas.width - bgImage.width * scale) / 2;
                const y = (canvas.height - bgImage.height * scale) / 2;
                ctx.drawImage(bgImage, x, y, bgImage.width * scale, bgImage.height * scale);
                ctx.globalAlpha = 1;
            }

            // Draw gradient
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, color1);
            gradient.addColorStop(1, color2);
            ctx.fillStyle = gradient;
            ctx.globalAlpha = bgImage ? (gradientOverlayOpacity / 100) : 1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = 1;

            // Add decorative elements based on alignment
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = '#ffffff';
            if (textAlignment === 'left') {
                ctx.beginPath();
                ctx.arc(1400, 100, 200, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(200, 350, 150, 0, Math.PI * 2);
                ctx.fill();
            } else if (textAlignment === 'center') {
                ctx.beginPath();
                ctx.arc(canvas.width / 2, 350, 250, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(200, 100, 200, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(1400, 350, 150, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Set text alignment
            ctx.textAlign = textAlignment;
            ctx.fillStyle = textColor;

            // Main heading
            ctx.font = `bold 80px ${fontFamily}`;
            const mainTextX = getTextX(ctx.measureText(mainText).width);
            ctx.fillText(mainText, mainTextX, 150);

            // Subtitle
            ctx.font = `40px ${fontFamily}`;
            const subTextX = getTextX(ctx.measureText(subText).width);
            ctx.fillText(subText, subTextX, 220);

            // Decorative line
            ctx.strokeStyle = textColor;
            ctx.globalAlpha = 0.3;
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (textAlignment === 'left') {
                ctx.moveTo(80, 250);
                ctx.lineTo(400, 250);
            } else if (textAlignment === 'center') {
                ctx.moveTo(canvas.width / 2 - 160, 250);
                ctx.lineTo(canvas.width / 2 + 160, 250);
            } else {
                ctx.moveTo(canvas.width - 400, 250);
                ctx.lineTo(canvas.width - 80, 250);
            }
            ctx.stroke();
            ctx.globalAlpha = 1;

            // Additional text
            if (additionalText) {
                ctx.font = `28px ${fontFamily}`;
                const words = additionalText.split(' ');
                let line = '';
                let y = 290;
                const maxWidth = canvas.width - 160;

                for (let i = 0; i < words.length; i++) {
                    const testLine = line + words[i] + ' ';
                    const metrics = ctx.measureText(testLine);
                    if (metrics.width > maxWidth && i > 0) {
                        const lineX = getTextX(ctx.measureText(line).width);
                        ctx.fillText(line, lineX, y);
                        line = words[i] + ' ';
                        y += 40;
                        if (y > 370) break;
                    } else {
                        line = testLine;
                    }
                }
                if (y <= 370) {
                    const lineX = getTextX(ctx.measureText(line).width);
                    ctx.fillText(line, lineX, y);
                }
            }
        }

        function downloadBanner() {
            try {
                canvas.toBlob(function(blob) {
                    if (!blob) {
                        console.error('Failed to create blob');
                        fallbackDownload();
                        return;
                    }
                    
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'linkedin-banner-1584x396.png';
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    setTimeout(() => {
                        URL.revokeObjectURL(url);
                    }, 100);
                }, 'image/png', 1.0);
            } catch (error) {
                console.error('Download error:', error);
                fallbackDownload();
            }
        }

        function fallbackDownload() {
            try {
                const dataURL = canvas.toDataURL('image/png', 1.0);
                const link = document.createElement('a');
                link.download = 'linkedin-banner-1584x396.png';
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert('Download failed. Please try right-clicking the banner and selecting "Save Image As..."');
            }
        }

        // Initial draw
        window.addEventListener('DOMContentLoaded', function() {
            const firstTemplate = document.querySelector('.template-card');
            if (firstTemplate) {
                selectTemplate('minimal', firstTemplate);
            }
            drawBanner();
        });
    </script>
