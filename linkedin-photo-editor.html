        <h1>📸 Professional LinkedIn Photo Editor</h1>
        <p class="subtitle">Upload your photo and enhance it for a natural, professional look</p>

        <div class="upload-area" id="uploadArea">

            </div>

            <div class="controls">
                <div class="control-group">
                    <label>Brightness</label>
                    <input type="range" id="brightness" min="-50" max="50" value="0" step="1">

                </div>
                <div class="control-group">
                    <label>Contrast</label>
                    <input type="range" id="contrast" min="-50" max="50" value="0" step="1">
                    <div class="value-display" id="contrastValue">0</div>
                </div>
                <div class="control-group">
                    <label>Saturation</label>
                    <input type="range" id="saturation" min="-50" max="50" value="0" step="1">
                    <div class="value-display" id="saturationValue">0</div>
                </div>
                <div class="control-group">

                </div>
                <div class="control-group">
                    <label>Warmth</label>
                    <input type="range" id="warmth" min="-50" max="50" value="0" step="1">
                    <div class="value-display" id="warmthValue">0</div>
                </div>

    <script>
        let originalImage = null;
        let settings = {
            brightness: 0,
            contrast: 0,
            saturation: 0,
            sharpness: 0,
            warmth: 0,
            clarity: 0
        };

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const editorSection = document.getElementById('editorSection');
        const originalCanvas = document.getElementById('originalCanvas');
        const editedCanvas = document.getElementById('editedCanvas');
        const originalCtx = originalCanvas.getContext('2d');
        const editedCtx = editedCanvas.getContext('2d');

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    originalImage = img;
                    setupCanvases();
                    editorSection.classList.add('active');
                    uploadArea.style.display = 'none';
                    applyPreset('professional');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setupCanvases() {
            const maxWidth = 400;
            const maxHeight = 500;
            let width = originalImage.width;
            let height = originalImage.height;

            if (width > maxWidth || height > maxHeight) {
                const ratio = Math.min(maxWidth / width, maxHeight / height);
                width *= ratio;
                height *= ratio;
            }

            originalCanvas.width = editedCanvas.width = width;
            originalCanvas.height = editedCanvas.height = height;

            originalCtx.drawImage(originalImage, 0, 0, width, height);
            applyFilters();
        }

        // Setup sliders
        ['brightness', 'contrast', 'saturation', 'sharpness', 'warmth', 'clarity'].forEach(control => {
            const slider = document.getElementById(control);
            const display = document.getElementById(control + 'Value');
            
            slider.addEventListener('input', (e) => {
                settings[control] = parseInt(e.target.value);
                display.textContent = e.target.value;
                applyFilters();
            });
        });

        function applyPreset(preset) {
            const presets = {
                natural: { brightness: 5, contrast: 10, saturation: -5, sharpness: 20, warmth: 5, clarity: 15 },
                professional: { brightness: 10, contrast: 15, saturation: 0, sharpness: 30, warmth: 0, clarity: 25 },
                warm: { brightness: 8, contrast: 12, saturation: 10, sharpness: 25, warmth: 20, clarity: 20 },
                clear: { brightness: 15, contrast: 20, saturation: 5, sharpness: 35, warmth: -5, clarity: 30 },
                reset: { brightness: 0, contrast: 0, saturation: 0, sharpness: 0, warmth: 0, clarity: 0 }
            };

            if (presets[preset]) {
                settings = { ...presets[preset] };
                Object.keys(settings).forEach(key => {
                    const slider = document.getElementById(key);
                    const display = document.getElementById(key + 'Value');
                    slider.value = settings[key];
                    display.textContent = settings[key];
                });
                applyFilters();
            }

            document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function applyFilters() {
            const width = editedCanvas.width;
            const height = editedCanvas.height;

            editedCtx.drawImage(originalImage, 0, 0, width, height);
            let imageData = editedCtx.getImageData(0, 0, width, height);
            let data = imageData.data;

            const brightnessAdj = settings.brightness * 2.55;
            const contrastFactor = (259 * (settings.contrast + 255)) / (255 * (259 - settings.contrast));
            const saturationFactor = 1 + settings.saturation / 100;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // Brightness
                r += brightnessAdj;
                g += brightnessAdj;
                b += brightnessAdj;

                // Contrast
                r = contrastFactor * (r - 128) + 128;
                g = contrastFactor * (g - 128) + 128;
                b = contrastFactor * (b - 128) + 128;

                // Saturation
                const gray = 0.299 * r + 0.587 * g + 0.114 * b;
                r = gray + (r - gray) * saturationFactor;
                g = gray + (g - gray) * saturationFactor;
                b = gray + (b - gray) * saturationFactor;

                // Warmth
                if (settings.warmth > 0) {
                    r += settings.warmth * 0.5;
                    b -= settings.warmth * 0.3;
                } else {
                    r += settings.warmth * 0.3;
                    b -= settings.warmth * 0.5;
                }

                // Clarity (simple edge enhancement)
                if (settings.clarity > 0) {
                    const clarityBoost = settings.clarity * 0.01;
                    const lum = 0.299 * r + 0.587 * g + 0.114 * b;
                    const delta = lum - 128;
                    r += delta * clarityBoost;
                    g += delta * clarityBoost;
                    b += delta * clarityBoost;
                }

                data[i] = Math.max(0, Math.min(255, r));
                data[i + 1] = Math.max(0, Math.min(255, g));
                data[i + 2] = Math.max(0, Math.min(255, b));
            }

            editedCtx.putImageData(imageData, 0, 0);

            // Sharpness
            if (settings.sharpness > 0) {
                applySharpness(settings.sharpness / 100);
            }
        }

        function applySharpness(amount) {
            const width = editedCanvas.width;
            const height = editedCanvas.height;
            const imageData = editedCtx.getImageData(0, 0, width, height);
            const data = imageData.data;
            const kernel = [0, -amount, 0, -amount, 1 + 4 * amount, -amount, 0, -amount, 0];
            const side = Math.round(Math.sqrt(kernel.length));
            const halfSide = Math.floor(side / 2);
            const output = new Uint8ClampedArray(data.length);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const dstOff = (y * width + x) * 4;
                    let r = 0, g = 0, b = 0;

                    for (let cy = 0; cy < side; cy++) {
                        for (let cx = 0; cx < side; cx++) {
                            const scy = y + cy - halfSide;
                            const scx = x + cx - halfSide;
                            if (scy >= 0 && scy < height && scx >= 0 && scx < width) {
                                const srcOff = (scy * width + scx) * 4;
                                const wt = kernel[cy * side + cx];
                                r += data[srcOff] * wt;
                                g += data[srcOff + 1] * wt;
                                b += data[srcOff + 2] * wt;
                            }
                        }
                    }

                    output[dstOff] = Math.max(0, Math.min(255, r));
                    output[dstOff + 1] = Math.max(0, Math.min(255, g));
                    output[dstOff + 2] = Math.max(0, Math.min(255, b));
                    output[dstOff + 3] = data[dstOff + 3];
                }
            }

            for (let i = 0; i < data.length; i++) {
                data[i] = output[i];
            }

            editedCtx.putImageData(imageData, 0, 0);
        }

        function downloadImage() {
            try {
                // Convert canvas to blob for better compatibility
                editedCanvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = 'linkedin-photo-professional.png';
                    link.href = url;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Clean up the URL object
                    setTimeout(() => URL.revokeObjectURL(url), 100);
                }, 'image/png', 1.0);
            } catch (error) {
                // Fallback method
                const link = document.createElement('a');
                link.download = 'linkedin-photo-professional.png';
                link.href = editedCanvas.toDataURL('image/png', 1.0);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        function resetAndUploadNew() {
            editorSection.classList.remove('active');
            uploadArea.style.display = 'block';
            fileInput.value = '';
            settings = {
                brightness: 0,
                contrast: 0,
                saturation: 0,
                sharpness: 0,
                warmth: 0,
                clarity: 0
            };
        }
    </script>
